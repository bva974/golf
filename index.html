<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur de tarifs</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: linear-gradient(160deg,#1B4D2E,#2E7D32 60%,#43A047); min-height:100vh; padding:28px 16px; }
.app { max-width:820px; margin:0 auto; }
.header { text-align:center; margin-bottom:28px; }
.header h1 { font-size:24px; font-weight:700; color:#fff; margin-bottom:6px; }
.header p  { font-size:13px; color:rgba(255,255,255,.75); }
.card { background:#fff; border-radius:16px; padding:20px 22px; margin-bottom:14px; }
.slabel { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#2E7D32; margin-bottom:14px; }
.ftoggle { display:flex; background:#f0f0f0; border-radius:10px; padding:3px; width:fit-content; margin-bottom:14px; }
.ftoggle button { padding:6px 18px; border:none; background:transparent; border-radius:8px; font-size:13px; font-weight:600; color:#888; cursor:pointer; }
.ftoggle button.on { background:#2E7D32; color:#fff; }
.frow { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.frow:last-child { margin-bottom:0; }
.frow label { font-size:13px; color:#444; flex:1; }
.funit { font-size:12px; color:#999; min-width:40px; }
.stepper { display:flex; align-items:center; border:1.5px solid #ddd; border-radius:10px; overflow:hidden; }
.sbt { width:40px; height:40px; border:none; background:#f5f5f5; font-size:20px; font-weight:700; color:#2E7D32; cursor:pointer; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; flex-shrink:0; }
.sbt:active { background:#C8E6C9; }
.sval { width:44px; text-align:center; font-size:17px; font-weight:700; color:#1a1a1a; border:none; outline:none; background:#fff; padding:0; line-height:40px; }
.stepper.abs { border-color:#FFCC80; }
.stepper.abs .sbt { color:#E65100; }
.stepper.abs .sbt:active { background:#FFE0B2; }
.pbtns { display:flex; gap:8px; flex-wrap:wrap; }
.pbtn { padding:8px 18px; border:2px solid #ddd; border-radius:20px; font-size:13px; font-weight:600; color:#666; background:#f5f5f5; cursor:pointer; transition:all .15s; }
.pbtn:hover { border-color:#A5D6A7; color:#2E7D32; background:#F1F8E9; }
.pbtn.on { background:#2E7D32; color:#fff; border-color:#2E7D32; }
.cmpcard { background:#fff; border-radius:16px; padding:20px 22px; margin-bottom:14px; }
.cmptitle { font-size:14px; font-weight:600; color:#555; margin-bottom:16px; }
.rrow { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; margin-bottom:10px; border-left:5px solid transparent; }
.rrow:last-child { margin-bottom:0; }
.rmedal { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; flex-shrink:0; }
.rinfo { flex:1; min-width:0; }
.rname { font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rdetail { font-size:11px; margin-top:2px; }
.rright { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.rprice { font-weight:900; white-space:nowrap; }
.rsub { font-size:10px; }
.rdiff { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; }
.r1 { background:#E8F5E9; border-left-color:#2E7D32; }
.r1 .rmedal,.r1 .rdiff { background:#2E7D32; color:#fff; }
.r1 .rname { color:#1B5E20; font-size:15px; }
.r1 .rdetail,.r1 .rsub { color:#388E3C; }
.r1 .rprice { color:#1B5E20; font-size:22px; }
.r2 { background:#FFF3E0; border-left-color:#E65100; }
.r2 .rmedal { background:#E65100; color:#fff; }
.r2 .rdiff { background:#FFE0B2; color:#BF360C; }
.r2 .rname { color:#BF360C; font-size:14px; }
.r2 .rdetail,.r2 .rsub { color:#E65100; }
.r2 .rprice { color:#BF360C; font-size:19px; }
.r3 { background:#FFEBEE; border-left-color:#C62828; }
.r3 .rmedal { background:#C62828; color:#fff; }
.r3 .rdiff { background:#FFCDD2; color:#B71C1C; }
.r3 .rname { color:#B71C1C; font-size:13px; }
.r3 .rdetail,.r3 .rsub { color:#C62828; }
.r3 .rprice { color:#B71C1C; font-size:17px; }
.rn { background:#F5F5F5; border-left-color:#9E9E9E; }
.rn .rmedal { background:#9E9E9E; color:#fff; }
.rn .rdiff { background:#E0E0E0; color:#555; }
.rn .rname { color:#444; font-size:13px; }
.rn .rdetail,.rn .rsub { color:#888; }
.rn .rprice { color:#444; font-size:16px; }
.vbar { border-radius:12px; padding:14px 18px; font-size:14px; font-weight:700; text-align:center; margin-top:14px; }
.vg { background:#2E7D32; color:#fff; }
.vgr { background:#E3F2FD; color:#0D47A1; }
.payblock { display:none; margin-top:18px; border-top:1px solid #eee; padding-top:18px; }
.paygrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.paycol { border-radius:12px; padding:16px; border:2px solid #A5D6A7; background:#E8F5E9; }
.paycol .pt { font-size:11px; font-weight:700; text-transform:uppercase; margin-bottom:6px; }
.paycol .pp { font-size:24px; font-weight:800; margin-bottom:2px; }
.paycol .ps { font-size:11px; margin-bottom:8px; }
.paycol .pk { font-size:13px; font-weight:700; }
@media(max-width:600px){
  .rname { font-size:13px!important; } .rprice { font-size:17px!important; }
  .r1 .rprice { font-size:19px!important; } .rdiff { font-size:10px; padding:2px 8px; }
  .cmpcard,.card { padding:14px; } .cmptitle { font-size:12px; }
  .header h1 { font-size:18px; }
}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>Simulateur de tarifs</h1>
  <p>Indiquez votre fréquence de jeu pour connaître la formule la plus avantageuse</p>
</div>

<div class="card">
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px;">
    <div>
      <div class="slabel">Ma fréquence de jeu</div>
      <div class="ftoggle">
        <button id="bsem" class="on" onclick="setFM('sem')">Par semaine</button>
        <button id="bmois" onclick="setFM('mois')">Par mois</button>
      </div>
      <div class="frow"><label>Parcours 18 trous</label>
        <div class="stepper"><button class="sbt" onclick="step('f18',-1)">−</button><input class="sval" type="number" id="f18" value="0" min="0" max="99" readonly><button class="sbt" onclick="step('f18',1)">+</button></div>
        <span class="funit" id="u18">/ sem.</span></div>
      <div class="frow"><label>Parcours 9 trous</label>
        <div class="stepper"><button class="sbt" onclick="step('f9',-1)">−</button><input class="sval" type="number" id="f9" value="0" min="0" max="99" readonly><button class="sbt" onclick="step('f9',1)">+</button></div>
        <span class="funit" id="u9">/ sem.</span></div>
      <div style="height:1px;background:#f0f0f0;margin:12px 0;"></div>
      <div class="frow"><label style="color:#E65100;">Semaines d'absence / an</label>
        <div class="stepper abs"><button class="sbt" onclick="step('fab',-1)">−</button><input class="sval" type="number" id="fab" value="0" min="0" max="52" readonly><button class="sbt" onclick="step('fab',1)">+</button></div>
        <span class="funit" style="color:#E65100;">sem.</span></div>
      <div id="absinfo" style="font-size:11px;color:#888;margin-top:6px;"></div>
    </div>
    <div>
      <div class="slabel">Mon profil abonnement</div>
      <div class="pbtns" id="pbtns"></div>
    </div>
  </div>
</div>

<div class="cmpcard">
  <div class="cmptitle" id="cmptitle"></div>
  <div id="ranking"></div>
  <div class="payblock" id="payblock">
    <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#2E7D32;margin-bottom:14px;">Mensuel ou comptant — lequel choisir ?</div>
    <div class="paygrid">
      <div class="paycol" id="pcM"><div class="pt">Paiement mensuel</div><div class="pp" id="ppM"></div><div class="ps">× 12 mois</div><div class="pk" id="ptM"></div></div>
      <div class="paycol" id="pcC"><div class="pt">Paiement comptant</div><div class="pp" id="ppC"></div><div class="ps">en une fois</div><div class="pk" id="pkC"></div></div>
    </div>
    <div id="pverd" style="border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;text-align:center;"></div>
  </div>
  <div class="vbar" id="vbar"></div>
</div>

</div>

<script>
/* ============================================================
   DONNÉES — modifiez directement ici
   ============================================================ */

// Green fees publics de référence (€)
var GF_PUB_18 = 65;   // green fee 18 trous plein tarif
var GF_PUB_9  = 43;   // green fee 9 trous plein tarif

/* -- Formules disponibles -----------------------------------
   Chaque formule est un objet avec un "type" :

   TYPE "pub"    → tarif public (référence, pas de données à saisir)
   TYPE "gf"     → green fees réduits + carte annuelle optionnelle
                   champs : gf18 (€/18T), gf9 (€/9T), annualCard (€/an)
   TYPE "carnet" → carnet de tickets (1 ticket = 9T, 2 tickets = 18T)
                   champs : carnetQty (nb tickets), carnet9Total (€ total 9T), carnet18Total (€ total 18T)
   TYPE "fixed"  → abonnement mensuel, green fees offerts
                   champs : profiles (tableau de profils, voir ci-dessous)
------------------------------------------------------------- */
var FORMULES = [
  {
    id: 1,
    type: 'pub',
    name: 'Tarif public',
    desc: 'Green fees - plein tarif'
  },
  {
    id: 2,
    type: 'gf',
    name: 'Carte "LeClub Classic"',
    desc: 'Green fees - tarifs réduits',
    gf18: 49,           // € par 18 trous
    gf9:  32,           // € par 9 trous
    annualCard: 59      // € coût de la carte / an (amorti sur 12 mois)
  },
  {
    id: 4,
    type: 'carnet',
    name: 'Carnet 10 green fees',
    desc: '1 ticket = 9 trous / 2 tickets = 18 trous',
    carnetQty:      10, // nombre de tickets dans le carnet
    carnet9Total:  340, // prix total du carnet 9T (€)
    carnet18Total: 520  // prix total du carnet 18T (€)
  },
  {
    id: 3,
    type: 'fixed',
    name: 'Abonnement annuel',
    desc: 'Green fees offerts',
    /* Profils : autant de lignes que nécessaire
       label   → nom affiché sur le bouton
       monthly → cotisation mensuelle (€/mois)
       annual  → cotisation comptant (€/an) — laisser 0 si non disponible */
    profiles: [
      { label: 'Adulte',       monthly: 199, annual: 2334 },
      { label: 'Adulte Primo', monthly: 159, annual: 1867 },
      { label: 'Couple',       monthly: 319, annual: 3736 },
      { label: 'Étudiant',     monthly: 130, annual: 1517 },
      { label: 'Jeune',        monthly:  80, annual:  467 }
    ]
  }
];

/* ============================================================
   FIN DES DONNÉES — ne pas modifier en dessous
   ============================================================ */

var FM = 'sem', PI = 0;

function v(id){ var e=document.getElementById(id); return e?(+e.value||0):0; }
function fmt(n){ return Math.round(n).toLocaleString('fr-FR')+' €'; }

function step(id,d){
  var e=document.getElementById(id);
  e.value=Math.min(+e.max||99,Math.max(+e.min||0,(+e.value||0)+d));
  calc();
}
function setFM(m){
  FM=m;
  document.getElementById('bsem').className=m==='sem'?'on':'';
  document.getElementById('bmois').className=m==='mois'?'on':'';
  document.getElementById('u18').textContent=m==='sem'?'/ sem.':'/ mois';
  document.getElementById('u9').textContent=m==='sem'?'/ sem.':'/ mois';
  calc();
}

function getFreq(){
  var f18=v('f18'),f9=v('f9'),ab=Math.min(v('fab'),52),act=52-ab;
  var ai=document.getElementById('absinfo');
  if(ai) ai.textContent=act+' semaines de jeu effectives / an';
  if(FM==='sem') return {t18:Math.round(f18*act/12*10)/10,t9:Math.round(f9*act/12*10)/10};
  return {t18:Math.round(f18*(act/52)*10)/10,t9:Math.round(f9*(act/52)*10)/10};
}

function getFxd(){ return FORMULES.find(function(f){return f.type==='fixed'&&f.profiles;}); }

function costOf(f,t18,t9){
  if(f.type==='pub')    return t18*GF_PUB_18+t9*GF_PUB_9;
  if(f.type==='gf')     return (f.annualCard||0)/12+t18*(f.gf18||0)+t9*(f.gf9||0);
  if(f.type==='carnet'){
    var qty=f.carnetQty||10;
    return t9*(f.carnet9Total||0)/qty+t18*(f.carnet18Total||0)/qty*2;
  }
  if(f.type==='fixed'){
    var pp=f.profiles&&f.profiles.length?f.profiles[Math.min(PI,f.profiles.length-1)]:null;
    return pp?pp.monthly:(f.monthly||0);
  }
  return 0;
}

function buildPBtns(){
  var fxd=getFxd();
  var c=document.getElementById('pbtns');
  if(!fxd){c.innerHTML='';return;}
  if(PI>=fxd.profiles.length) PI=0;
  c.innerHTML=fxd.profiles.map(function(p,i){
    return '<button class="pbtn'+(i===PI?' on':'')+'" onclick="selP('+i+')">'+p.label+'</button>';
  }).join('');
}
function selP(i){
  PI=i;
  document.querySelectorAll('.pbtn').forEach(function(b,j){b.className='pbtn'+(j===i?' on':'');});
  calc();
}

function calc(){
  var fr=getFreq();
  var res=FORMULES.map(function(f){
    return {id:f.id,name:f.name,desc:f.desc||'',type:f.type,cost:costOf(f,fr.t18,fr.t9),fm:f};
  }).sort(function(a,b){return a.cost-b.cost;});
  var best=res[0].cost;
  var fl=FM==='sem'
    ?(v('f18')+v('f9'))+' parcours/semaine → '+Math.round((fr.t18+fr.t9)*10)/10+' parcours effectifs/mois'
    :Math.round((fr.t18+fr.t9)*10)/10+' parcours effectifs/mois';
  document.getElementById('cmptitle').textContent='Comparaison pour '+fl;
  var cls=['r1','r2','r3'];
  document.getElementById('ranking').innerHTML=res.map(function(r,i){
    var c=i<3?cls[i]:'rn';
    var d=i===0?'<span class="rdiff">★ Meilleur choix</span>':'<span class="rdiff">+'+fmt(r.cost-best)+'/mois</span>';
    return '<div class="rrow '+c+'"><div class="rmedal">'+(i+1)+'</div>'
      +'<div class="rinfo"><div class="rname">'+r.name+'</div><div class="rdetail">'+r.desc+'</div></div>'
      +'<div class="rright"><div class="rprice">'+fmt(r.cost)+'</div><div class="rsub">par mois</div>'+d+'</div></div>';
  }).join('');
  var pb=document.getElementById('payblock');
  var bfm=res[0].fm;
  if(bfm.type==='fixed'&&bfm.profiles&&bfm.profiles.length){
    pb.style.display='block';
    var pp=bfm.profiles[Math.min(PI,bfm.profiles.length-1)];
    var mon=pp.monthly,ann=pp.annual||0,tot=mon*12,sav=tot-ann;
    document.getElementById('ppM').textContent=fmt(mon);
    document.getElementById('ptM').textContent='Total annuel : '+fmt(tot);
    document.getElementById('ppC').textContent=fmt(ann);
    var pMC=document.getElementById('pcM'),pCC=document.getElementById('pcC'),pV=document.getElementById('pverd');
    if(ann>0&&sav>0){
      document.getElementById('pkC').textContent='Économie : '+fmt(sav)+' vs mensuel';
      pCC.style.cssText='border-radius:12px;padding:16px;border:2px solid #1B5E20;background:#2E7D32;';
      pCC.querySelectorAll('div').forEach(function(d){d.style.color='#fff';});
      pMC.style.cssText='border-radius:12px;padding:16px;border:2px solid #A5D6A7;background:#E8F5E9;';
      pMC.querySelectorAll('div').forEach(function(d){d.style.color='#1B5E20';});
      pV.style.cssText='border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;text-align:center;background:#2E7D32;color:#fff;';
      pV.textContent='✅ Payer comptant est plus avantageux : économie de '+fmt(sav)+' sur l\'année.';
    } else if(ann>0&&sav<0){
      document.getElementById('pkC').textContent='Coûte '+fmt(-sav)+' de plus';
      pMC.style.cssText='border-radius:12px;padding:16px;border:2px solid #1B5E20;background:#2E7D32;';
      pMC.querySelectorAll('div').forEach(function(d){d.style.color='#fff';});
      pCC.style.cssText='border-radius:12px;padding:16px;border:2px solid #A5D6A7;background:#E8F5E9;';
      pCC.querySelectorAll('div').forEach(function(d){d.style.color='#1B5E20';});
      pV.style.cssText='border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;text-align:center;background:#1565C0;color:#fff;';
      pV.textContent='ℹ️ Le paiement mensuel est moins cher sur l\'année.';
    } else {
      document.getElementById('pkC').textContent=ann>0?'Équivalent au mensuel':'—';
      [pMC,pCC].forEach(function(c){c.style.cssText='border-radius:12px;padding:16px;border:2px solid #A5D6A7;background:#E8F5E9;';c.querySelectorAll('div').forEach(function(d){d.style.color='#1B5E20';});});
      pV.style.cssText='border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;text-align:center;background:#F5F5F5;color:#555;';
      pV.textContent='Les deux options reviennent au même montant annuel.';
    }
  } else { pb.style.display='none'; }
  var vb=document.getElementById('vbar');
  var pubr=res.find(function(r){return r.fm.type==='pub';});
  if(res[0].fm.type==='pub'){
    vb.className='vbar vgr';
    vb.textContent='ℹ️ Pour ce rythme, le tarif public est le plus avantageux — aucun engagement nécessaire.';
  } else {
    var eco=pubr?pubr.cost-best:0;
    vb.className='vbar vg';
    vb.textContent='✅ La formule "'+res[0].name+'" est la plus avantageuse'+(eco>0?' — économie de '+fmt(eco)+'/mois vs le tarif public':'')+'.';
  }
}

buildPBtns(); calc();
</script>
</body>
</html>
